<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis V1 - News Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            overflow-x: hidden;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #00ff88;
            padding-bottom: 20px;
        }
        .header h1 {
            font-size: 2.5em;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
            margin-bottom: 10px;
        }
        .header p { color: #888; font-size: 0.9em; }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        .section {
            background: rgba(15, 20, 50, 0.8);
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .section h2 {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 1.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .news-item {
            background: rgba(10, 14, 39, 0.6);
            border-left: 3px solid #00ff88;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .news-item:hover {
            background: rgba(10, 14, 39, 0.9);
            transform: translateX(10px);
            border-left-color: #ff00ff;
        }
        .news-item h3 {
            color: #00ff88;
            margin-bottom: 8px;
            font-size: 1.1em;
        }
        .news-item p {
            color: #b0b0b0;
            font-size: 0.9em;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        .news-source {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8em;
            color: #666;
        }
        .news-source span { 
            background: rgba(0, 255, 136, 0.1);
            padding: 4px 8px;
            border-radius: 3px;
            color: #00ff88;
        }
        .news-link {
            display: inline-block;
            margin-top: 10px;
            color: #00ff88;
            text-decoration: none;
            font-size: 0.85em;
            border-bottom: 1px dotted #00ff88;
        }
        .news-link:hover { color: #ff00ff; border-bottom-color: #ff00ff; }
        .loading {
            text-align: center;
            color: #00ff88;
            padding: 40px;
            font-size: 1.2em;
        }
        .error {
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid #ff0000;
            color: #ff6666;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .back-btn {
            background: #00ff88;
            color: #0a0e27;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: #ff00ff;
            box-shadow: 0 0 20px #ff00ff;
        }
        .timestamp {
            text-align: center;
            color: #666;
            font-size: 0.85em;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="window.history.back()">← Back to Dashboard</button>
        
        <div class="header">
            <h1>📰 Jarvis V1 News Dashboard</h1>
            <p>Real-time trending news from India, South India & International</p>
        </div>

        <div id="error-container"></div>

        <div class="news-grid">
            <!-- India News -->
            <div class="section">
                <h2>🇮🇳 India News</h2>
                <div id="india-news" class="loading">Loading India news...</div>
            </div>

            <!-- South India News -->
            <div class="section">
                <h2>🏘️ South India News</h2>
                <div id="south-india-news" class="loading">Loading South India news...</div>
            </div>

            <!-- International News -->
            <div class="section">
                <h2>🌍 International News</h2>
                <div id="international-news" class="loading">Loading International news...</div>
            </div>
        </div>

        <div class="timestamp">
            Last updated: <span id="timestamp">--:--:--</span>
        </div>
    </div>

    <script>
        async function loadNews() {
            try {
                const response = await fetch('/api/news');
                const data = await response.json();

                if (data.error) {
                    document.getElementById('error-container').innerHTML = 
                        `<div class="error">⚠️ Error loading news: ${data.error}</div>`;
                    return;
                }

                renderNews('india', data.india);
                renderNews('south-india', data.south_india);
                renderNews('international', data.international);

                const time = new Date(data.timestamp).toLocaleTimeString();
                document.getElementById('timestamp').textContent = time;
            } catch (error) {
                document.getElementById('error-container').innerHTML = 
                    `<div class="error">⚠️ Failed to load news: ${error.message}</div>`;
            }
        }

        function renderNews(region, articles) {
            const container = document.getElementById(`${region}-news`);
            
            if (!articles || articles.length === 0) {
                container.innerHTML = '<p style="color: #666;">No news available</p>';
                return;
            }

            container.innerHTML = articles.map(article => `
                <div class="news-item">
                    <h3>${article.title || 'Untitled'}</h3>
                    <p>${article.description || 'No description available'}</p>
                    <div class="news-source">
                        <span>${article.source || 'Unknown Source'}</span>
                        <span>${formatDate(article.pubDate)}</span>
                    </div>
                    <a href="${article.link}" target="_blank" class="news-link">Read more →</a>
                </div>
            `).join('');
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'Recent';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' });
        }

        // Load news when page loads
        window.addEventListener('load', loadNews);
        
        // Refresh every 5 minutes
        setInterval(loadNews, 5 * 60 * 1000);
    </script>
</body>
</html>
